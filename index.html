<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopX</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">
    <main class="d-flex min-vh-100 align-items-end justify-content-center px-3 pb-4">
        <div class="card shadow-sm w-100 mx-auto" style="max-width: 480px; border-radius: 18px;">
            <div class="card-body text-center py-5 px-4">
                <h1 class="h2 fw-bold mb-3">Welcome to PopX</h1>
                <p class="text-secondary mb-4">Lorem ipsum dolor sit amet, consectetur adipiscing elit,</p>

                <div class="d-grid gap-3">
                    <button id="createBtn" class="btn btn-primary btn-lg">Create Account</button>
                    <button id="loginBtn" class="btn btn-outline-primary btn-lg">Already Registered? Login</button>
                </div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
