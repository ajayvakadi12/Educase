<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - PopX</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light" style="background: #f5f7fb;">
  <main class="d-flex min-vh-100 align-items-start justify-content-center py-4 px-3">
    <div class="w-100" style="max-width: 520px;">
      <div class="card shadow-sm border-0 h-100" style="min-height: calc(100vh - 3rem);">
        <div class="card-body d-flex flex-column p-0">
          <div class="p-4 border-bottom">
            <h1 class="h5 mb-0">Account Settings</h1>
          </div>

          <div class="p-4 flex-grow-1">
            <div class="d-flex align-items-start gap-3 mb-3">
              <div class="position-relative">
                <img id="profilePhoto" src="https://sp.yimg.com/ib/th/id/OIP.mnzxn5MDTRbWoGHkNJiczgHaIV?pid=Api&w=148&h=148&c=7&dpr=2&rs=1" alt="Profile" class="rounded-circle" style="width: 72px; height: 72px; object-fit: cover;">
                <button id="editPhoto" type="button" class="btn btn-camera btn-sm position-absolute" style="right: -6px; bottom: -6px; width: 34px; height: 34px; border-radius: 50%;">
                  📷
                </button>
                <input id="photoInput" type="file" accept="image/*" hidden>
              </div>

              <div>
                <p class="mb-1 fw-semibold">Marry Doe</p>
                <p class="text-muted mb-0">Marry@Gmail.Com</p>
              </div>
            </div>

            <p class="text-muted small">Lorem ipsum dolor sit amet, consetetur sadipscing elitr, sed diam nonumy eirmod tempor invidunt ut labore et dolore magna aliquyam erat, sed diam.</p>
          </div>

          <div class="border-top border-dashed"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/account.js"></script>
</body>
</html>
