<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login to PopX</title>

  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
  <main class="d-flex min-vh-100 align-items-start justify-content-center py-5 px-3">
    <div class="card shadow-sm w-100" style="max-width: 480px;">
      <div class="card-body position-relative py-5 px-4">
        <h1 class="h4 fw-bold mb-4">Welcome back</h1>
        <p class="text-secondary mb-4">Log in to continue to your PopX dashboard.</p>

        <form id="loginForm" class="mb-4">
          <div class="mb-3">
            <label for="loginEmail" class="form-label">Email address</label>
            <input type="email" class="form-control" id="loginEmail" placeholder="you@example.com" required>
          </div>

          <div class="mb-4">
            <label for="loginPassword" class="form-label">Password</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
          </div>

          <button id="loginBtn" type="submit" class="btn btn-secondary btn-lg w-100" disabled>Login</button>
        </form>

        <p class="text-center small mb-0">Don’t have an account? <a href="signup.html">Create one</a></p>
      </div>
    </div>
  </main>

  <script src="js/login.js"></script>
</body>
</html>
