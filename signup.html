<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create your PopX account</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <main class="d-flex min-vh-100 align-items-start justify-content-center py-5 px-3">
        <div class="card shadow-sm w-100" style="max-width: 480px;">
            <div class="card-body position-relative py-5 px-4">
                <div class="position-absolute top-0 end-0 mt-3 me-3">
                    <span class="badge rounded-circle bg-warning text-dark" style="width: 34px; height: 34px; line-height: 34px; font-weight: 600;">1</span>
                </div>

                <h1 class="h4 fw-bold mb-4">Create your PopX account</h1>

                <form id="signupForm" class="mb-4" action="account.html" method="GET">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name<span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="fullName" placeholder="Marry Doe" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone number<span class="text-danger">*</span></label>
                        <input type="tel" class="form-control" id="phone" placeholder="123-456-7890" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email address<span class="text-danger">*</span></label>
                        <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password<span class="text-danger">*</span></label>
                        <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="mb-4">
                        <label for="company" class="form-label">Company name</label>
                        <input type="text" class="form-control" id="company" placeholder="Company name">
                    </div>

                    <fieldset class="mb-4">
                        <legend class="col-form-label pb-2">Are you an Agency?<span class="text-danger">*</span></legend>
                        <div class="d-flex gap-4">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="agency" id="agencyYes" value="yes" checked>
                                <label class="form-check-label" for="agencyYes">Yes</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="agency" id="agencyNo" value="no">
                                <label class="form-check-label" for="agencyNo">No</label>
                            </div>
                        </div>
                    </fieldset>

                    <button type="submit" class="btn btn-primary btn-lg w-100">Create Account</button>
                </form>

                <p class="text-center text-muted small mb-0">By creating an account, you agree to our terms and privacy policy.</p>
            </div>
        </div>
    </main>

    <script src="js/signup.js"></script>
</body>
</html>
